services:
  - type: web
    name: mi-proyecto
    runtime: python
    plan: free
    region: oregon
    branch: main

    buildCommand: bash build.sh
    startCommand: gunicorn mi_proyecto.wsgi:application

    healthCheckPath: /

    envVars:
      - key: DJANGO_ENV
        value: production

      - key: DEBUG
        value: "False"

      - key: ALLOWED_HOSTS
        value: mi-proyecto.onrender.com

      - key: CSRF_TRUSTED_ORIGINS
        value: https://mi-proyecto.onrender.com

      - key: SECRET_KEY
        sync: false

      - key: STATIC_URL
        value: /static/

      - key: STATIC_ROOT
        value: /opt/render/project/src/staticfiles

      - key: MEDIA_URL
        value: /media/

      - key: MEDIA_ROOT
        value: /opt/render/project/src/media

      - key: DB_ENGINE
        value: django.db.backends.postgresql

      - key: DB_NAME
        sync: false

      - key: DB_USER
        sync: false

      - key: DB_PASSWORD
        sync: false

      - key: DB_HOST
        sync: false

      - key: DB_PORT
        value: "5432"
