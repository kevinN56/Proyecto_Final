{% extends 'base.html' %}

{% block title %}Cambiar Contraseña{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h2>Cambiar Contraseña</h2>


        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}


            <button class="btn-auth">
                Guardar cambios
            </button>

        </form>


        <p class="auth-text">

            <a href="{% url 'perfil' %}">
                Volver al perfil
            </a>

        </p>


    </div>

</div>

{% endblock %}
